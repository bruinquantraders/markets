name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html CNAME .nojekyll _site/
          cp -r assets _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      # Pages allows one deployment in flight; rapid pushes can fail the newer run.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
        continue-on-error: true

      - name: Wait for in-flight deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 90

      - name: Deploy to GitHub Pages (retry)
        if: steps.deployment.outcome == 'failure'
        id: deployment-retry
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
